<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World App</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }
    button {
      padding: 16px 32px;
      font-size: 18px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #45a049; }
    #message {
      margin-top: 24px;
      font-size: 32px;
      font-weight: bold;
      color: #333;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <button onclick="showMessage()">Click Me</button>
  <div id="message"></div>
  <script>
    function showMessage() {
      document.getElementById('message').textContent = 'Hello World!';
    }
  </script>
</body>
</html>
